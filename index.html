<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>筆順練習</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #fff9f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  h1 { font-size: 1.4rem; color: #e07b39; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #999; margin-bottom: 16px; }
  .chars-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }
  .char-btn {
    width: 60px; height: 60px;
    border-radius: 12px;
    border: 3px solid #ddd;
    background: #fff;
    font-size: 2rem;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .char-btn.active { border-color: #e07b39; background: #fff3e8; }
  .char-btn.done { border-color: #4caf50; background: #e8f5e9; }
  .char-btn .badge {
    position: absolute; top: -6px; right: -6px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #4caf50;
    color: #fff;
    font-size: 0.7rem;
    display: flex; align-items: center; justify-content: center;
    display: none;
  }
  .char-btn.done .badge { display: flex; }

  .canvas-wrap {
    position: relative;
    width: min(360px, 90vw);
    height: min(360px, 90vw);
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,.1);
    overflow: hidden;
    touch-action: none;
  }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .info-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
    width: min(360px, 90vw);
  }
  .stroke-info {
    flex: 1;
    font-size: 0.9rem;
    color: #666;
  }
  .hint-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 2px solid #e07b39;
    background: #fff;
    color: #e07b39;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all .2s;
  }
  .hint-btn:active { background: #e07b39; color: #fff; }

  /* 慶祝動畫 */
  #celebrate {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #celebrate.show { display: flex; }
  .celebrate-box {
    background: #fff;
    border-radius: 24px;
    padding: 32px 40px;
    text-align: center;
    animation: pop .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .celebrate-emoji { font-size: 4rem; }
  .celebrate-text { font-size: 1.4rem; font-weight: bold; color: #e07b39; margin-top: 8px; }
  .celebrate-sub { font-size: 0.9rem; color: #999; margin-top: 4px; }
  .celebrate-btn {
    margin-top: 16px;
    padding: 10px 28px;
    border-radius: 20px;
    border: none;
    background: #e07b39;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
  }

  /* 紙花 */
  .confetti {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 50;
    animation: fall 1.2s ease-in forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .loading { color: #aaa; font-size: 0.9rem; margin-top: 20px; }
  .error { color: #e53935; font-size: 0.85rem; margin-top: 8px; }
</style>
</head>
<body>

<h1>✏️ 筆順練習</h1>
<p class="subtitle" id="date-label"></p>

<div class="chars-row" id="chars-row"></div>

<div class="canvas-wrap" id="canvas-wrap">
  <canvas id="bg-canvas"></canvas>
  <canvas id="draw-canvas"></canvas>
</div>

<div class="info-row">
  <div class="stroke-info" id="stroke-info">載入中…</div>
  <button class="hint-btn" id="hint-btn" onclick="showHint()">看提示</button>
</div>
<div class="error" id="error-msg"></div>

<div id="celebrate">
  <div class="celebrate-box">
    <div class="celebrate-emoji">🎉</div>
    <div class="celebrate-text">太棒了！</div>
    <div class="celebrate-sub">今天的 3 個字全部完成！</div>
    <button class="celebrate-btn" onclick="closeCelebrate()">再練一次</button>
  </div>
</div>

<script>
// ── 字庫（7 組，依日期輪替）──────────────────────────────
const GROUPS = [
  ['一','二','三'],
  ['山','水','火'],
  ['大','小','中'],
  ['人','口','手'],
  ['日','月','木'],
  ['上','下','土'],
  ['天','地','心'],
];

const BASE = 'https://raw.githubusercontent.com/c9s/zh-stroke-data/master/json/';

// ── 狀態 ─────────────────────────────────────────────────
let chars = [];          // 今日 3 字
let charData = [];       // 每字的筆畫陣列
let charDone = [];       // 每字是否完成
let curChar = 0;         // 目前選的字 index
let curStroke = 0;       // 目前要寫第幾劃
let drawing = false;
let path = [];           // 目前描繪的點

// ── Canvas ───────────────────────────────────────────────
const wrap = document.getElementById('canvas-wrap');
const bgC  = document.getElementById('bg-canvas');
const drC  = document.getElementById('draw-canvas');
const bgX  = bgC.getContext('2d');
const drX  = drC.getContext('2d');

function resize() {
  const s = wrap.clientWidth;
  [bgC, drC].forEach(c => { c.width = s; c.height = s; });
  renderChar();
}

// ── 初始化 ───────────────────────────────────────────────
async function init() {
  const today = new Date();
  const dayIdx = Math.floor(today.getTime() / 86400000);
  const group = GROUPS[dayIdx % GROUPS.length];
  chars = group;
  charDone = [false, false, false];

  document.getElementById('date-label').textContent =
    `${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()} 今日練習`;

  buildCharBtns();
  resize();

  // 載入所有字的資料
  charData = await Promise.all(chars.map(loadChar));
  selectChar(0);
}

async function loadChar(ch) {
  const cp = ch.codePointAt(0).toString(16).toLowerCase();
  try {
    const r = await fetch(BASE + cp + '.json');
    if (!r.ok) throw new Error('not found');
    return await r.json();
  } catch {
    return null;
  }
}

// ── UI ───────────────────────────────────────────────────
function buildCharBtns() {
  const row = document.getElementById('chars-row');
  row.innerHTML = '';
  chars.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'char-btn' + (i === 0 ? ' active' : '');
    btn.id = 'btn-' + i;
    btn.innerHTML = ch + '<span class="badge">✓</span>';
    btn.onclick = () => selectChar(i);
    row.appendChild(btn);
  });
}

function selectChar(i) {
  curChar = i;
  curStroke = 0;
  path = [];
  document.querySelectorAll('.char-btn').forEach((b, j) => {
    b.className = 'char-btn' + (j === i ? ' active' : '') + (charDone[j] ? ' done' : '');
  });
  document.getElementById('error-msg').textContent = '';
  renderChar();
  updateInfo();
}

function updateInfo() {
  const data = charData[curChar];
  if (!data) {
    document.getElementById('stroke-info').textContent = '資料載入失敗';
    return;
  }
  if (charDone[curChar]) {
    document.getElementById('stroke-info').textContent = `「${chars[curChar]}」完成！`;
    return;
  }
  document.getElementById('stroke-info').textContent =
    `「${chars[curChar]}」第 ${curStroke + 1} / ${data.length} 劃`;
}

// ── 渲染 ─────────────────────────────────────────────────
const VBOX = 2048; // 資料座標系

function toCanvas(x, y, size) {
  return [x / VBOX * size, y / VBOX * size];
}

function drawOutline(ctx, stroke, size, style) {
  ctx.beginPath();
  for (const cmd of stroke.outline) {
    if (cmd.type === 'M') {
      const [cx, cy] = toCanvas(cmd.x, cmd.y, size);
      ctx.moveTo(cx, cy);
    } else if (cmd.type === 'L') {
      const [cx, cy] = toCanvas(cmd.x, cmd.y, size);
      ctx.lineTo(cx, cy);
    } else if (cmd.type === 'Q') {
      const [bx, by] = toCanvas(cmd.begin.x, cmd.begin.y, size);
      const [ex, ey] = toCanvas(cmd.end.x, cmd.end.y, size);
      ctx.quadraticCurveTo(bx, by, ex, ey);
    }
  }
  ctx.closePath();
  ctx.fillStyle = style;
  ctx.fill();
}

function renderChar() {
  const size = bgC.width;
  bgX.clearRect(0, 0, size, size);
  drX.clearRect(0, 0, size, size);

  const data = charData[curChar];
  if (!data) return;

  // 畫格子
  bgX.strokeStyle = '#f0e0d0';
  bgX.lineWidth = 1;
  bgX.setLineDash([4, 4]);
  bgX.beginPath();
  bgX.moveTo(size/2, 0); bgX.lineTo(size/2, size);
  bgX.moveTo(0, size/2); bgX.lineTo(size, size/2);
  bgX.stroke();
  bgX.setLineDash([]);

  // 所有筆畫淡灰底
  data.forEach((s, i) => {
    const color = i < curStroke ? '#a5d6a7' : '#e0e0e0';
    drawOutline(bgX, s, size, color);
  });

  // 當前筆畫高亮（橘色）
  if (!charDone[curChar] && curStroke < data.length) {
    drawOutline(bgX, data[curStroke], size, 'rgba(224,123,57,0.35)');
  }
}

// ── 描繪互動 ─────────────────────────────────────────────
function getPos(e) {
  const rect = drC.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [src.clientX - rect.left, src.clientY - rect.top];
}

drC.addEventListener('pointerdown', e => {
  if (charDone[curChar]) return;
  drawing = true;
  path = [getPos(e)];
  drC.setPointerCapture(e.pointerId);
});

drC.addEventListener('pointermove', e => {
  if (!drawing) return;
  path.push(getPos(e));
  const size = drC.width;
  drX.clearRect(0, 0, size, size);
  drX.beginPath();
  drX.strokeStyle = '#1565c0';
  drX.lineWidth = size * 0.025;
  drX.lineCap = 'round';
  drX.lineJoin = 'round';
  drX.moveTo(path[0][0], path[0][1]);
  path.forEach(p => drX.lineTo(p[0], p[1]));
  drX.stroke();
});

drC.addEventListener('pointerup', () => {
  if (!drawing) return;
  drawing = false;
  checkStroke();
});

// ── 筆畫驗證 ─────────────────────────────────────────────
function checkStroke() {
  const data = charData[curChar];
  if (!data || curStroke >= data.length) return;

  const size = drC.width;
  const track = data[curStroke].track;
  const tol = size * 0.22; // 容錯半徑（小朋友用，設大一點）

  // 驗證：描繪路徑要依序經過 track 點
  let ti = 0;
  for (const pt of path) {
    const [tx, ty] = toCanvas(track[ti].x, track[ti].y, size);
    const dx = pt[0] - tx, dy = pt[1] - ty;
    if (Math.sqrt(dx*dx + dy*dy) < tol) {
      ti++;
      if (ti >= track.length) break;
    }
  }

  drX.clearRect(0, 0, size, size);

  if (ti >= track.length) {
    // 成功
    curStroke++;
    confetti();
    if (curStroke >= data.length) {
      charDone[curChar] = true;
      document.getElementById('btn-' + curChar).className = 'char-btn done';
      setTimeout(() => {
        if (charDone.every(Boolean)) showCelebrate();
        else updateInfo();
      }, 400);
    }
    renderChar();
    updateInfo();
  } else {
    // 失敗：閃紅提示
    document.getElementById('error-msg').textContent = '再試一次！從左到右、從上到下 ✏️';
    setTimeout(() => { document.getElementById('error-msg').textContent = ''; }, 1500);
  }
  path = [];
}

// ── 提示動畫 ─────────────────────────────────────────────
function showHint() {
  const data = charData[curChar];
  if (!data || curStroke >= data.length) return;
  const size = drC.width;
  const track = data[curStroke].track;
  let i = 0;
  drX.clearRect(0, 0, size, size);

  function step() {
    if (i >= track.length) return;
    const [x, y] = toCanvas(track[i].x, track[i].y, size);
    drX.beginPath();
    drX.arc(x, y, size * 0.04, 0, Math.PI * 2);
    drX.fillStyle = 'rgba(255,100,0,0.6)';
    drX.fill();
    i++;
    setTimeout(step, 300);
  }
  step();
  setTimeout(() => drX.clearRect(0, 0, size, size), track.length * 300 + 500);
}

// ── 紙花 ─────────────────────────────────────────────────
const COLORS = ['#f44336','#e91e63','#9c27b0','#2196f3','#4caf50','#ff9800','#ffeb3b'];
function confetti() {
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.cssText = `
      left:${20 + Math.random()*60}vw;
      top:${10 + Math.random()*30}vh;
      background:${COLORS[i % COLORS.length]};
      animation-delay:${Math.random()*0.3}s;
      animation-duration:${0.8 + Math.random()*0.6}s;
      transform:rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ── 慶祝 ─────────────────────────────────────────────────
function showCelebrate() {
  for (let i = 0; i < 60; i++) setTimeout(confetti, i * 80);
  document.getElementById('celebrate').classList.add('show');
}

function closeCelebrate() {
  document.getElementById('celebrate').classList.remove('show');
  charDone = [false, false, false];
  curChar = 0; curStroke = 0;
  buildCharBtns();
  selectChar(0);
}

// ── 啟動 ─────────────────────────────────────────────────
window.addEventListener('resize', resize);
init();
</script>
</body>
</html>
