<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>筆順練習</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>✏️ 筆順練習</h1>
<p class="subtitle" id="date-label"></p>

<div class="chars-row" id="chars-row"></div>

<div class="canvas-wrap" id="canvas-wrap">
  <canvas id="bg-canvas"></canvas>
  <canvas id="draw-canvas"></canvas>
</div>

<div class="info-row">
  <div class="stroke-info" id="stroke-info">載入中…</div>
  <button class="hint-btn" onclick="showHint()">逐筆提示</button>
  <button class="hint-btn" onclick="showFullOrder()">完整筆順</button>
</div>
<div class="error" id="error-msg"></div>

<div id="celebrate">
  <div class="celebrate-box">
    <div class="celebrate-emoji">🎉</div>
    <div class="celebrate-text">太棒了！</div>
    <div class="celebrate-sub">今天的 3 個字全部完成！</div>
    <button class="celebrate-btn" onclick="closeCelebrate()">再練一次</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
